<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VALGRAVE — Raid. Loot. Extract. Or be forgotten.</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0c0e; font-family:'Segoe UI',Arial,sans-serif; color:#cfd3d6; }
  canvas { display:block; }
  .hidden { display:none !important; }

  /* ---------- HUD (raid) ---------- */
  #hud { position:absolute; inset:0; pointer-events:none; }
  #crosshair { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:18px; color:rgba(255,255,255,.7); }
  #bars { position:absolute; left:20px; bottom:20px; width:260px; }
  .bar { height:14px; background:rgba(0,0,0,.55); border:1px solid #333; margin-top:6px; border-radius:3px; overflow:hidden; }
  .bar > div { height:100%; transition:width .12s; }
  #hpFill { background:linear-gradient(#c0392b,#8e2418); width:100%; }
  #stamFill { background:linear-gradient(#d9c544,#a8941f); width:100%; }
  #weightTxt { font-size:12px; margin-top:5px; color:#9aa0a6; text-shadow:0 1px 2px #000; }
  #weightTxt.over { color:#e74c3c; font-weight:bold; }
  #timerBox { position:absolute; top:14px; right:20px; text-align:right; text-shadow:0 1px 3px #000; }
  #timer { font-size:26px; font-weight:bold; color:#e8e2c8; letter-spacing:2px; }
  #timer.storm { color:#ff5040; animation:pulse 1s infinite; }
  #runeList { font-size:12px; color:#9fd49f; margin-top:4px; line-height:1.5; }
  @keyframes pulse { 50% { opacity:.45; } }
  #compass { position:absolute; top:0; left:50%; transform:translateX(-50%); width:520px; height:30px; background:linear-gradient(rgba(0,0,0,.5),transparent); overflow:hidden; }
  #compass span { position:absolute; top:4px; font-size:15px; transform:translateX(-50%); text-shadow:0 1px 3px #000; }
  #hotbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; }
  .slot { min-width:96px; padding:6px 10px; background:rgba(10,12,14,.7); border:1px solid #3a3f44; border-radius:4px; font-size:12px; text-align:center; }
  .slot.active { border-color:#d9c544; color:#f4eecb; }
  .slot b { display:block; font-size:10px; color:#777; font-weight:normal; }
  #interact { position:absolute; left:50%; top:58%; transform:translateX(-50%); text-align:center; font-size:15px; text-shadow:0 1px 3px #000; color:#e8e2c8; }
  #interactBar { width:180px; height:7px; border:1px solid #555; margin:6px auto 0; border-radius:3px; overflow:hidden; }
  #interactBar > div { height:100%; background:#7ec850; width:0%; }
  #extractBox { position:absolute; left:50%; top:32%; transform:translateX(-50%); text-align:center; color:#9fe89f; font-size:20px; text-shadow:0 1px 4px #000; }
  #log { position:absolute; left:20px; bottom:110px; font-size:13px; text-shadow:0 1px 2px #000; line-height:1.5; }
  #log div { opacity:.9; }
  #bigMsg { position:absolute; left:50%; top:22%; transform:translateX(-50%); font-size:30px; font-weight:bold; color:#f0e6c0; text-shadow:0 2px 8px #000; text-align:center; transition:opacity .5s; opacity:0; white-space:nowrap; }
  #drawBar { position:absolute; left:50%; top:54%; transform:translateX(-50%); width:90px; height:5px; border:1px solid #666; border-radius:2px; overflow:hidden; }
  #drawBar > div { height:100%; background:#e8e2c8; width:0%; }
  #dmgVignette { position:absolute; inset:0; box-shadow:inset 0 0 140px rgba(200,20,10,.0); transition:box-shadow .15s; }

  /* ---------- Overlays ---------- */
  .overlay { position:absolute; inset:0; background:rgba(6,8,10,.88); display:flex; align-items:center; justify-content:center; z-index:10; }
  .panel { background:#14181c; border:1px solid #2e353b; border-radius:8px; padding:28px 34px; max-width:1100px; max-height:92vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.7); }
  .panel h1 { font-size:34px; letter-spacing:6px; color:#e8e2c8; margin-bottom:2px; }
  .panel h1 small { font-size:13px; letter-spacing:1px; color:#777; display:block; margin-top:2px; }
  .panel h2 { font-size:15px; color:#d9c544; margin:14px 0 8px; letter-spacing:1px; border-bottom:1px solid #2e353b; padding-bottom:4px; }
  button { background:#2a3138; color:#dfe3e6; border:1px solid #444c54; border-radius:4px; padding:5px 12px; cursor:pointer; font-size:13px; }
  button:hover { background:#39424b; }
  button:disabled { opacity:.35; cursor:default; }
  button.primary { background:#5a4f1e; border-color:#8a7a2e; color:#f4eecb; font-size:16px; padding:10px 26px; letter-spacing:1px; }
  button.primary:hover { background:#6e6126; }
  button.danger { background:#5a2222; border-color:#8a3a3a; }
  table { border-collapse:collapse; font-size:13px; width:100%; }
  td { padding:3px 8px 3px 0; vertical-align:middle; }
  td.num { color:#9aa0a6; }
  .cols { display:flex; gap:30px; align-items:flex-start; }
  .col { min-width:230px; }
  .muted { color:#777; font-size:12px; }
  .gold { color:#d9c544; }
  .req-ok { color:#7ec850; } .req-no { color:#c05050; }
  .slotrow { background:#1b2126; border:1px solid #2e353b; border-radius:4px; padding:6px 10px; margin-bottom:6px; font-size:13px; display:flex; justify-content:space-between; align-items:center; min-width:220px; }
  #statsLine { font-size:12px; color:#888; margin-top:6px; }
  .summary-list { font-size:14px; line-height:1.7; margin:10px 0; }
  .centerpanel { text-align:center; }
  .keys { font-size:12px; color:#8a9096; margin-top:16px; line-height:1.8; }
  .keys b { color:#cfd3d6; background:#22282e; padding:1px 6px; border-radius:3px; border:1px solid #3a4148; }
</style>
</head>
<body>
<div id="hud" class="hidden">
  <div id="dmgVignette"></div>
  <div id="compass"></div>
  <div id="crosshair">+</div>
  <div id="drawBar" class="hidden"><div></div></div>
  <div id="bars">
    <div class="bar"><div id="hpFill"></div></div>
    <div class="bar"><div id="stamFill"></div></div>
    <div id="weightTxt"></div>
  </div>
  <div id="timerBox"><div id="timer">9:00</div><div id="runeList"></div></div>
  <div id="hotbar">
    <div class="slot" id="slotMelee"><b>1</b><span></span></div>
    <div class="slot" id="slotBow"><b>2</b><span></span></div>
    <div class="slot" id="slotFood"><b>F · eat</b><span></span></div>
    <div class="slot" id="slotArmor"><b>armor</b><span></span></div>
  </div>
  <div id="interact" class="hidden"><span id="interactTxt"></span><div id="interactBar"><div></div></div></div>
  <div id="extractBox" class="hidden"></div>
  <div id="log"></div>
  <div id="bigMsg"></div>
</div>

<div id="baseScreen" class="overlay"><div class="panel" id="basePanel"></div></div>
<div id="pauseScreen" class="overlay hidden"><div class="panel centerpanel" id="pausePanel"></div></div>
<div id="invScreen" class="overlay hidden" style="background:rgba(6,8,10,.7)"><div class="panel" id="invPanel"></div></div>
<div id="endScreen" class="overlay hidden"><div class="panel centerpanel" id="endPanel"></div></div>
<div id="clickCatch" class="overlay hidden" style="background:rgba(6,8,10,.55)">
  <div class="panel centerpanel"><h1 style="font-size:22px;letter-spacing:2px">RAID READY</h1>
  <p class="muted" style="margin:10px 0 16px">Click below to take control. Reach a green extraction rune before the storm.</p>
  <button class="primary" onclick="Game.lock()">ENTER RAID</button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/world.js"></script>
<script src="js/entities.js"></script>
<script src="js/player.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
